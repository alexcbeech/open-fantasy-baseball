name: Nightly data sync

on:
  schedule:
    # 10:00 UTC = 06:00 ET / 03:00 PT. Runs after every MLB game (including
    # west-coast night games, which can end ~01:00 PT) is final, so game logs
    # and recomputed matchup scores reflect the full day's results.
    - cron: "0 10 * * *"
  # Also runnable on demand from the Actions tab (e.g. to backfill after a
  # deploy or to test the pipeline without waiting for the schedule).
  workflow_dispatch: {}

# Never run two syncs at once (a manual dispatch overlapping a scheduled run),
# but don't cancel one that's already in flight.
concurrency:
  group: nightly-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Order matters. Teams/rosters/schedule first so today's games and any
      # new players exist before stats attribute to them; then stats (season /
      # splits / game logs), then projections (derived from season + trailing
      # splits) and matchups (recomputed from those fresh season stats). News
      # is independent.
      #
      # continue-on-error isolates a schedule-sync failure from the rest of the
      # pipeline (stats/news don't depend on the schedule and should still run),
      # while the ingestion_run it writes records the failure in the admin
      # panel's Recent Runs and the guard step below still fails the workflow.
      - name: Sync MLB teams, rosters, and schedule
        id: sync_mlb
        continue-on-error: true
        run: npm run sync:mlb

      # Bio detail (jersey numbers, bat side, throwing hand). Hands feed the
      # platoon-aware daily projections, so keep them fresh as rosters churn.
      - name: Sync player bios
        continue-on-error: true
        run: npm run sync:bios

      - name: Sync player stats (season, splits, game logs)
        run: npm run sync:stats

      - name: Sync rest-of-season projections
        run: npm run sync:projections

      - name: Sync player news
        run: npm run sync:news

      # Run domain processing last, on the freshly synced data: waiver
      # resolution, matchup score recompute, and end-of-period snapshot/lock.
      # Enqueues the day's jobs (dedup-keyed) and drains the durable job queue.
      # (Matchup recompute lives here now, not a standalone sync:matchups step.)
      - name: Process due jobs
        run: npm run jobs:run

      # Surface a schedule-sync failure loudly: the ingestion_run above is
      # already marked 'failed' (visible in the admin panel), and this turns the
      # workflow red so the stale schedule is noticed instead of passing silently.
      - name: Fail if the MLB sync step failed
        if: steps.sync_mlb.outcome == 'failure'
        run: |
          echo "::error::MLB teams/rosters/schedule sync failed — the schedule is stale. See the admin panel's Recent Runs for the error."
          exit 1
