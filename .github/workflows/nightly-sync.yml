name: Nightly data sync

on:
  schedule:
    # 10:00 UTC = 06:00 ET / 03:00 PT. Runs after every MLB game (including
    # west-coast night games, which can end ~01:00 PT) is final, so game logs
    # and recomputed matchup scores reflect the full day's results.
    - cron: "0 10 * * *"
  # Also runnable on demand from the Actions tab (e.g. to backfill after a
  # deploy or to test the pipeline without waiting for the schedule).
  workflow_dispatch: {}

# Never run two syncs at once (a manual dispatch overlapping a scheduled run),
# but don't cancel one that's already in flight.
concurrency:
  group: nightly-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Order matters: stats first (writes season / splits / game logs), then
      # projections (derived from season + trailing splits) and matchups
      # (recomputed from those fresh season stats). News is independent.
      - name: Sync player stats (season, splits, game logs)
        run: npm run sync:stats

      - name: Sync rest-of-season projections
        run: npm run sync:projections

      - name: Sync player news
        run: npm run sync:news

      # Run domain processing last, on the freshly synced data: waiver
      # resolution, matchup score recompute, and end-of-period snapshot/lock.
      # Enqueues the day's jobs (dedup-keyed) and drains the durable job queue.
      # (Matchup recompute lives here now, not a standalone sync:matchups step.)
      - name: Process due jobs
        run: npm run jobs:run
